spring:
  application:
    name: lifeos-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:lifeos}
    username: ${POSTGRES_USER:lifeos}
    password: ${POSTGRES_PASSWORD:lifeos}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: lifeos-pool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  # Honour a platform-injected PORT (Render/Heroku/etc.), then SERVER_PORT, then 8080.
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# Application-specific configuration (bound via @ConfigurationProperties)
lifeos:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-please-make-this-very-long-32bytes+}
      access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
      refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:1209600000}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  ai:
    provider: ${AI_PROVIDER:openai}
    api-key: ${OPENAI_API_KEY:}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    model: ${AI_MODEL:gpt-4o-mini}
    embeddings-model: ${EMBEDDINGS_MODEL:text-embedding-3-small}
    temperature: ${AI_TEMPERATURE:0.7}
    max-history-messages: ${AI_MAX_HISTORY_MESSAGES:20}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local:
      base-dir: ${STORAGE_LOCAL_DIR:./data/uploads}
    s3:
      endpoint: ${S3_ENDPOINT:}
      region: ${S3_REGION:us-east-1}
      bucket: ${S3_BUCKET:lifeos-documents}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    com.lifeos: INFO
    org.springframework.security: WARN
