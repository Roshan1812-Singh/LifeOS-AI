# ============================================================
# 'local' profile: run the whole backend with ZERO external services.
# Uses a file-based H2 database (data persists in ./data) and no Redis/Postgres.
# Schema is generated from the JPA entities (Flyway is Postgres-specific and
# disabled here). Use the default/dev/prod profiles for real PostgreSQL.
#
#   mvn spring-boot:run -Dspring-boot.run.profiles=local
# ============================================================
spring:
  datasource:
    url: jdbc:h2:file:./data/lifeos-local;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

logging:
  level:
    com.lifeos: DEBUG
